name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.x"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Type check
        run: uv run mypy src/finops || true   # non-blocking until types stabilize

      - name: Run tests
        run: uv run pytest -v -m "not integration and not llm"

      - name: Smoke test the CLI
        run: |
          uv run finops version
          uv run finops --help
